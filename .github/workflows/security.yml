name: security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  security-program:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-factor 2
          pnpm config set fetch-retry-mintimeout 10000
          pnpm config set fetch-retry-maxtimeout 60000
          pnpm config set network-timeout 120000
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --config.optional=true --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # pnpm 10 uses npm audit endpoints retired by the registry. Keep the
      # repository toolchain pinned while using pnpm 11's bulk advisory client.
      - name: Step 1 - Dependency Audit
        run: corepack pnpm@11.4.0 --pm-on-fail=ignore audit --audit-level=critical

      - name: Step 2 - Secret Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Step 3 - SBOM Generation
        run: |
          mkdir -p artifacts
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --ignore-npm-errors \
            --spec-version 1.5 \
            --output-file artifacts/sbom.json

      - name: Step 3.1 - SBOM Vulnerability Scan
        id: grype_scan
        # Keep scan visibility/signals during infrastructure validation: Grype DB freshness
        # staleness (external data age) should not block fallback/release proof paths.
        # Tighten this back to blocking mode during explicit security hardening milestones.
        continue-on-error: true
        uses: anchore/scan-action@v3
        with:
          sbom: artifacts/sbom.json
          output-format: sarif
          severity-cutoff: high
          fail-build: "${{ github.event_name != 'pull_request' }}"

      - name: Step 3.2 - Upload vulnerability scan artifact
        if: ${{ always() && steps.grype_scan.outputs.sarif != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-results
          path: ${{ steps.grype_scan.outputs.sarif }}
          if-no-files-found: warn

      - name: Step 3.3 - Capture deterministic security baseline
        shell: bash
        env:
          SARIF_PATH: "${{ steps.grype_scan.outputs.sarif }}"
        run: |
          mkdir -p .playbook
          node <<'NODE'
          const fs = require('node:fs');

          const sarifPath = process.env.SARIF_PATH;
          if (!sarifPath || !fs.existsSync(sarifPath)) {
            throw new Error(`Missing SARIF artifact at ${sarifPath ?? '<unset>'}.`);
          }

          const sarifRaw = fs.readFileSync(sarifPath, 'utf8');

          let sarif;
          if (!sarifRaw.trim()) {
            sarif = { runs: [] };
          } else {
            try {
              sarif = JSON.parse(sarifRaw);
            } catch (error) {
              throw new Error(`Failed to parse SARIF JSON at ${sarifPath}: ${error.message}`);
            }
          }
          const results = Array.isArray(sarif.runs)
            ? sarif.runs.flatMap((run) => (Array.isArray(run.results) ? run.results : []))
            : [];

          const parseDependencyPath = (value) => {
            if (typeof value !== 'string') return '';
            return value.split(/\s+/).filter(Boolean).join(' > ');
          };

          const findings = results.map((result) => {
            const props = result.properties || {};
            return {
              package_name: String(props.depPkgName || 'unknown'),
              installed_version: String(props.depPkgVersion || 'unknown'),
              ecosystem: String(props.depPkgType || 'unknown'),
              vulnerability_id: String(props.vulnerabilityID || result.ruleId || 'unknown'),
              severity: String(props.severity || result.level || 'unknown').toLowerCase(),
              dependency_path: parseDependencyPath(props.depPath || ''),
            };
          });

          const artifact = {
            schemaVersion: '1.0',
            kind: 'security-baseline',
            generatedAt: new Date().toISOString(),
            findings
          };

          fs.writeFileSync(
            '.playbook/security-baseline.json',
            JSON.stringify(artifact, null, 2) + '\n',
            'utf8'
          );
          NODE

      - name: Step 3.4 - Upload security baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-baseline
          path: .playbook/security-baseline.json
          if-no-files-found: error

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: 'v3.0.3'

      - name: Step 4 - Artifact Signing (Cosign)
        run: |
          cosign sign-blob \
            --yes \
            --bundle artifacts/sbom.sigstore.json \
            artifacts/sbom.json

      - name: Verify SBOM signature
        run: |
          cosign verify-blob \
            --bundle artifacts/sbom.sigstore.json \
            --certificate-identity-regexp "https://github.com/.+" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            artifacts/sbom.json

      - name: Step 5 - Provenance Attestation
        run: |
          mkdir -p artifacts
          node <<'NODE'
          const fs = require('node:fs');
          const payload = {
            buildType: 'playbook-security-program',
            builder: 'github-actions',
            commit: process.env.GITHUB_SHA,
            workflow: process.env.GITHUB_WORKFLOW,
            runId: process.env.GITHUB_RUN_ID
          };
          fs.writeFileSync(
            'artifacts/provenance.json',
            JSON.stringify(payload, null, 2) + '\n',
            'utf8'
          );
          NODE
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Step 6 - Security Policy Gate
        run: |
          test -f artifacts/sbom.json
          test -f artifacts/sbom.sigstore.json
          test -f artifacts/provenance.json

      - name: Security Regression Tests
        run: pnpm test:security
